<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../scrollbar.css" />
    <style>
      body {
        margin: 0;
        padding: 18px;
        background: transparent;
        font-family: "Pretendard", "Malgun Gothic", sans-serif;
        color: #1a2540;
      }

      .section-shell {
        display: grid;
        gap: 18px;
      }

      .hero-box {
        background: linear-gradient(135deg, #f7faff, #eef5ff);
        border: 1px solid rgba(122, 143, 191, 0.14);
        border-radius: 24px;
        padding: 22px;
      }

      .hero-kicker {
        font-size: 12px;
        font-weight: 900;
        color: #5d77c2;
        letter-spacing: 0.5px;
        margin-bottom: 8px;
      }

      .hero-desc {
        color: #657393;
        line-height: 1.8;
        font-size: 15px;
      }

      .block {
        display: grid;
        gap: 12px;
      }

      .block-title {
        font-size: 22px;
        font-weight: 900;
        color: #243252;
      }

      .number-list {
        display: grid;
        gap: 12px;
      }

      .number-item {
        display: flex;
        gap: 14px;
        align-items: flex-start;
        background: white;
        border: 1px solid rgba(122, 143, 191, 0.14);
        border-radius: 18px;
        padding: 16px;
        box-shadow: 0 8px 18px rgba(88, 109, 165, 0.06);
      }

      .number-badge {
        min-width: 38px;
        width: 38px;
        height: 38px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #eef3ff, #f2fbff);
        color: #4e69ba;
        font-weight: 900;
        font-size: 14px;
        flex-shrink: 0;
      }

      .number-text {
        flex: 1;
        font-size: 15px;
        line-height: 1.8;
        color: #1a2540;
        word-break: keep-all;
      }
    </style>
  </head>
  <body>
    <div class="section-shell">
      <div class="block">
        <div class="block-title">규칙</div>
        <div class="number-list">
          <div class="number-item">
            <div class="number-badge">1</div>
            <div class="number-text">고운 말 쓰기</div>
          </div>
          <div class="number-item">
            <div class="number-badge">2</div>
            <div class="number-text">인사 잘하기</div>
          </div>
          <div class="number-item">
            <div class="number-badge">3</div>
            <div class="number-text">시간약속 잘 지키기</div>
          </div>
          <div class="number-item">
            <div class="number-badge">4</div>
            <div class="number-text">교실에서 뛰지 않기</div>
          </div>
          <div class="number-item">
            <div class="number-badge">5</div>
            <div class="number-text">수업시간에 자지 않기</div>
          </div>
        </div>
      </div>

      <div class="block">
        <div class="block-title">개선사항</div>
        <div class="number-list">
          <div class="number-item">
            <div class="number-badge">-2</div>
            <div class="number-text">하품하지 않기</div>
          </div>
          <div class="number-item">
            <div class="number-badge">-1</div>
            <div class="number-text">울지 않기</div>
          </div>
          <div class="number-item">
            <div class="number-badge">0</div>
            <div class="number-text">고백하지 않기</div>
          </div>
          <div class="number-item">
            <div class="number-badge">1</div>
            <div class="number-text">조용히 하기</div>
          </div>
          <div class="number-item">
            <div class="number-badge">2</div>
            <div class="number-text">예비종이 울리면 자리에 앉기</div>
          </div>
          <div class="number-item">
            <div class="number-badge">3</div>
            <div class="number-text">6반 교실 앞에 있는 학생들 보내기</div>
          </div>
          <div class="number-item">
            <div class="number-badge">4</div>
            <div class="number-text">때리지 않기</div>
          </div>
          <div class="number-item">
            <div class="number-badge">5</div>
            <div class="number-text">욕하지 않기</div>
          </div>
          <div class="number-item">
            <div class="number-badge">6</div>
            <div class="number-text">친구들 말 존중하기</div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
