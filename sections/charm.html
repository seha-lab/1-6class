<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../scrollbar.css" />
    <style>
      body {
        margin: 0;
        padding: 18px;
        background: transparent;
      }

      .section-shell {
        display: grid;
        gap: 16px;
      }

      .hero-box {
        background: linear-gradient(135deg, #f8fbff, #f1f6ff);
        border: 1px solid rgba(122, 143, 191, 0.14);
        border-radius: 24px;
        padding: 22px;
      }

      .hero-kicker {
        font-size: 12px;
        font-weight: 900;
        color: #5d77c2;
        letter-spacing: 0.5px;
        margin-bottom: 8px;
      }

      .hero-desc {
        color: #657393;
        line-height: 1.8;
        font-size: 15px;
      }

      .number-list {
        display: grid;
        gap: 12px;
      }

      .number-item {
        display: flex;
        gap: 14px;
        align-items: flex-start;
        background: white;
        border: 1px solid rgba(122, 143, 191, 0.14);
        border-radius: 18px;
        padding: 16px;
        box-shadow: 0 8px 18px rgba(88, 109, 165, 0.06);
      }

      .number-badge {
        min-width: 38px;
        width: 38px;
        height: 38px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #eef3ff, #f2fbff);
        color: #4e69ba;
        font-weight: 900;
        font-size: 14px;
        flex-shrink: 0;
      }

      .number-text {
        flex: 1;
        font-size: 15px;
        line-height: 1.8;
        color: #1a2540;
        word-break: keep-all;
      }
    </style>
  </head>
  <body>
    <div class="section-shell">
      <div class="number-list">
        <div class="number-item">
          <div class="number-badge">1</div>
          <div class="number-text">담임선생님들이 잘생김</div>
        </div>

        <div class="number-item">
          <div class="number-badge">2</div>
          <div class="number-text">하하호호 재미있는 반</div>
        </div>

        <div class="number-item">
          <div class="number-badge">3</div>
          <div class="number-text">활기차고 화목한 반</div>
        </div>
      </div>
    </div>
  </body>
</html>
