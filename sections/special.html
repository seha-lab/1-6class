<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../scrollbar.css" />
    <style>
      body {
        margin: 0;
        padding: 18px;
        background: transparent;
        font-family: "Pretendard", "Malgun Gothic", sans-serif;
        color: #1a2540;
      }

      .section-shell {
        display: grid;
        gap: 16px;
      }

      .search-box {
        display: flex;
        gap: 10px;
        align-items: center;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.96),
          rgba(244, 248, 255, 0.96)
        );
        border: 1px solid rgba(122, 143, 191, 0.14);
        border-radius: 18px;
        padding: 12px 14px;
        box-shadow: 0 8px 18px rgba(88, 109, 165, 0.06);
        flex-wrap: wrap;
      }

      .search-input {
        flex: 1 1 220px;
        min-width: 0;
        border: none;
        outline: none;
        background: transparent;
        font: inherit;
        font-size: 15px;
        color: #1a2540;
      }

      .search-input::placeholder {
        color: #8a97b3;
      }

      .sort-select {
        flex: 0 0 auto;
        border: 1px solid rgba(122, 143, 191, 0.16);
        outline: none;
        padding: 10px 12px;
        border-radius: 12px;
        background: white;
        font: inherit;
        color: #1a2540;
        font-size: 14px;
        cursor: pointer;
      }

      .search-meta {
        font-size: 14px;
        color: #657393;
        line-height: 1.7;
        padding: 0 4px;
      }

      .timeline {
        display: grid;
        gap: 16px;
      }

      .timeline-item {
        display: grid;
        grid-template-columns: 110px 1fr;
        gap: 14px;
        align-items: start;
      }

      .timeline-date {
        background: linear-gradient(135deg, #eef3ff, #f2fbff);
        color: #4e69ba;
        border-radius: 16px;
        padding: 12px 14px;
        font-size: 14px;
        font-weight: 900;
        text-align: center;
      }

      .timeline-card {
        background: white;
        border: 1px solid rgba(122, 143, 191, 0.14);
        border-radius: 22px;
        padding: 20px;
        box-shadow: 0 10px 24px rgba(88, 109, 165, 0.06);
      }

      .timeline-title {
        font-size: 18px;
        font-weight: 900;
        margin-bottom: 10px;
        color: #1a2540;
      }

      .timeline-body {
        color: #1a2540;
        line-height: 1.8;
        font-size: 15px;
      }

      .empty-state {
        border: 1px dashed rgba(122, 143, 191, 0.24);
        border-radius: 20px;
        padding: 24px;
        background: rgba(255, 255, 255, 0.7);
        color: #73819d;
        line-height: 1.8;
        font-size: 14px;
      }

      mark {
        background: linear-gradient(135deg, #eef3ff, #dff4ff);
        color: #2a3f8f;
        padding: 2px 6px;
        border-radius: 6px;
        font-weight: 800;
      }

      @media (max-width: 760px) {
        .timeline-item {
          grid-template-columns: 1fr;
        }

        .timeline-date {
          text-align: left;
        }

        .sort-select {
          width: 100%;
        }
      }

      .rich-gray {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 8px;
        background: #eef1f5;
        color: #475569;
        font-weight: 700;
      }

      .rich-highlight {
        padding: 2px 6px;
        border-radius: 6px;
        background: linear-gradient(135deg, #fff7a8, #ffe76a);
        color: #4b3f00;
        font-weight: 800;
      }

      .rich-bold {
        font-weight: 900;
      }

      .rich-italic {
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div class="section-shell">
      <div class="search-box">
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="날짜나 행사이름 검색 예: 3/13, 반장선거, 이름외우기"
          oninput="renderTimeline()"
        />

        <select id="sortSelect" class="sort-select" onchange="renderTimeline()">
          <option value="latest">최신순</option>
          <option value="oldest">과거순</option>
        </select>
      </div>

      <div class="search-meta" id="searchMeta">총 0개의 기록</div>

      <div class="timeline" id="timeline"></div>
    </div>

    <script>
      const events = [
        {
          date: "3/3",
          title: "입학식",
          body: "처음으로 1-6에 발을 들인 날",
        },
        {
          date: "3/12",
          title: "처음으로 사고 친 날/구준모 연못에 들어가다",
          body: "$$구준모가$$ $$연못에$$ 공을 주으러 $$들어가서$$ 혼남",
        },
        {
          date: "3/13",
          title: "이름외우기",
          body: "이름외우기 게임을 함 상품은 빠삐꼬 였지만 !!한승지가 틀려!! !!쌍쌍바로 다운!! 되었다는 사실...",
        },
        {
          date: "3/19",
          title: "주제 과학시간에 혼나다",
          body: "주제과학시간에 Quick Share를 이용해 환경보호 포스터를 만드는 수업 중 누군가 김정은의 사진을 보내서 패드를 압수 당할 뻔함\n구준모 및 김도원은 아니며 !!실수로 보낸 것으로 밝혀짐!!",
        },
        {
          date: "3/18",
          title: "진단평가",
          body: "📝 $$진단평가$$ 실시\n\n📚 시간표\n- 1교시: 국어\n- 2교시: 수학\n- 3교시: 영어\n- 4교시: 사회\n- 5교시: 과학\n\n💻 시험 진행 중 $$MyCBT앱에서 튕기는 이슈$$가 있었지만,\n시험은 정상적으로 마무리됨.",
        },
        {
          date: "3/13",
          title: "진단평가 시험을 위한 연습",
          body: "진단평가를 할 때 $$MyCBT앱$$을 사용하는 법을 알기위해 연습함\n$$난이도가 중1 수준이 아니라$$ 당황했지만 연습이기 때문에 찍고 넘어감",
        },
        {
          date: "3/23",
          title: "1반과의 피구연습",
          body: "$$피구대회를 대비$$해 $$1반과 연습$$을 진행함\n4:1로 진 후 마지막 판에서 한 명 죽이면 끝나는 걸로해서 $$마지막에 한번 더 이김$$ 그래서 4:2",
        },
        {
          date: "3/20",
          title: "반장선거",
          body: "반장선거를 진행함\n!!반장: 김규민!! / !!부반장: 김도원!!\n\n김도원이 뒤를 돌아봐라 하고 애들이 전부 뒤를 돌아보자 $$이것이 나의 리더쉽이다$$ 라는 등 재미있는 연설을 함",
        },
        {
          date: "3/26",
          title: "첫 자리 바꾸기",
          body: "처음으로 자리를 바꿈",
        },
        {
          date: "3/27",
          title: "쌍쌍바 수여식",
          body: "3/13일 $$이름외우기 게임$$을 성공하여 !!쌍쌍바!!(빠삐꼬 -> 쌍쌍바)를 받게됨 짝궁과 반 나눠먹음",
        },
        {
          date: "4/1",
          title: "만우절~~!",
          body: "🌅 $$조회시간$$\n불을 끄고 다 같이 책상을 눕히고 칠판에 !!가로본능!!이라고 적어놓고 선생님을 기다림.\n하지만 $$유덕상 선생님이 아닌$$ !!7반 선생님!!(만우절)이 오셔서 모두 당황함.\n\n📚 $$1교시 사회A$$\n쉬는 시간에 세면대 팻말을 떼어 붙여놓았지만 수업 시작 직전에 1-5로 교체됨.\n선생님이 !!반을 착각하여 지나치심!!\n원래 9시 10분에 !!다 같이 쓰러질!! 예정이었지만 급하게 9시 15분으로 변경.\n하지만 쪽지를 보신 선생님은 눈치채시고 !!7분 전부터 녹화!! 중이셨음.\n\n🎵 $$2교시 음악$$\n아무것도 못 함.\n\n🧪 $$3교시 과학$$\n이번엔 세면대 팻말을 바꿨지만 $$3학년 몇 명$$이 복도를 달리며 !!우가우가!!를 외치며 팻말을 전부 뜯어감.\n\n⚽ $$4교시 체육$$\n아무것도 못 함.\n\n🍴$$점심시간$$: $$바뀐 팻말$$을 돌려 놓으라고 $$안내방송$$이 나옴 \n\n📖 $$5교시 국어(주제)$$\n선생님이 오시기 전 모두 $$시체$$가 됨.\n$$책상을$$ 살짝 $$엉망$$으로 어지럽히고 창문을 조금 열어 놓은 채 다 같이 바닥,책상에 쓰러진 상태. 친구들이 $$우솔별$$은 $$안대$$를 껴서 더 무섭고 $$김채윤$$은 머리가 길어 $$귀신$$ 같아서 무섭다고함\n국어 선생님이 오셔서 !!내가 여기 반 수업하는 거가 맞나?!! 라고 물으셨지만 아무도 대답하지 않음.\n결국 한 명이 아니라고 함.\n그 후 임선미가 !!6반 수업 해야 된다고 함!!\n선생님이 6반인 걸 모르신 건지 못 들으신 건지 모르겠지만 나가심.\n\n선생님이 나간 후 조우현이\n!!만우절~~ 해야지 진짜로 속이면 어떡해!!!\n라고 말함.\n\n얼마 뒤 선생님이 다시 오자 여기가 맞다고 함.\n선생님이 핸드폰 들고 올 걸 하시니까 애들이 그냥 들고 오라고 하심.\n선생님이 다시 나가자 시체를 재세팅함.\n$$박세하는 창문에 매달린 시체$$가 됨.\n\n📐 $$6교시 수학(주제)$$\n책상을 모두 뒤집어 놓고 공포 브금을 틀음.\n그래서 뒤돌아서 수업함.\n원래는 수업 중간에 갑자기 일어나서 짜여진 대본대로 연극을 할 계획도 있었지만 기각됨.",
        },
        {
          date: "3/30",
          title: "노 담배",
          body: "$$주요한$$ 강사님이 담배 예방 교육을 해주심.\n\n주요 키워드는 !!순간의 선택! 평생을 좌우!! 였다.\n\n직접 $$니코틴이 담긴 병$$, $$타르가 담긴 병$$, $$담배$$ 등을 가져와서 보여주심.\n\n마지막에는 술에 대한 이야기도 해주셨는데,\n술을 마시면 $$음주운전을 하면 안 된다는 것$$도 $$잊고$$,\n결국 $$음주운전$$이 $$발생$$할 수 있다고 하심.",
        },
      ];

      const timeline = document.getElementById("timeline");
      const searchInput = document.getElementById("searchInput");
      const searchMeta = document.getElementById("searchMeta");
      const sortSelect = document.getElementById("sortSelect");

      function escapeHtml(text) {
        return String(text)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function applyRichText(text) {
        return text
          .replace(/\$\$(.*?)\$\$/g, '<span class="rich-bold">$1</span>')
          .replace(/%%(.*?)%%/g, '<span class="rich-italic">$1</span>')
          .replace(/\*\*(.*?)\*\*/g, '<span class="rich-gray">$1</span>')
          .replace(/!!(.*?)!!/g, '<span class="rich-highlight">$1</span>');
      }

      function highlightText(text, keyword) {
        let safeText = escapeHtml(text);
        safeText = applyRichText(safeText);

        if (!keyword) return safeText.replace(/\n/g, "<br />");

        const escapedKeyword = keyword.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        const regex = new RegExp(`(${escapedKeyword})`, "gi");

        return safeText
          .replace(regex, "<mark>$1</mark>")
          .replace(/\n/g, "<br />");
      }

      function parseDate(dateText) {
        const match = String(dateText)
          .trim()
          .match(/^(\d{1,2})\/(\d{1,2})$/);

        if (!match) {
          return new Date(2026, 0, 1);
        }

        const month = Number(match[1]);
        const day = Number(match[2]);
        return new Date(2026, month - 1, day);
      }

      function renderTimeline() {
        const keyword = searchInput.value.trim().toLowerCase();
        const sortType = sortSelect.value;

        let filtered = events.filter((event) => {
          const target =
            `${event.date} ${event.title} ${event.body}`.toLowerCase();
          return target.includes(keyword);
        });

        filtered.sort((a, b) => {
          const dateA = parseDate(a.date);
          const dateB = parseDate(b.date);

          if (sortType === "latest") {
            return dateB - dateA;
          }

          return dateA - dateB;
        });

        searchMeta.textContent = `총 ${filtered.length}개의 기록`;
        timeline.innerHTML = "";

        if (filtered.length === 0) {
          timeline.innerHTML = `
            <div class="empty-state">
              검색된 기록이 없습니다.<br />
              날짜나 행사 이름으로 다시 검색해보세요.
            </div>
          `;
          return;
        }

        filtered.forEach((event) => {
          const item = document.createElement("div");
          item.className = "timeline-item";

          item.innerHTML = `
            <div class="timeline-date">${highlightText(event.date, keyword)}</div>
            <div class="timeline-card">
              <div class="timeline-title">${highlightText(event.title, keyword)}</div>
              <div class="timeline-body">${highlightText(event.body, keyword)}</div>
            </div>
          `;

          timeline.appendChild(item);
        });
      }

      renderTimeline();
    </script>
  </body>
</html>
